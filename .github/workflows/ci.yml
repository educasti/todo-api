name: CI Pipeline

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Verify coverage threshold
        run: |
          npm test -- --coverage --coverageThreshold='{"global":{"lines":90,"statements":90,"branches":80,"functions":90}}'

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t todo-api .

      - name: Smoke test container
        run: |
          docker run -d -p 3000:3000 --name todo-api-test todo-api
          sleep 3
          curl -f http://localhost:3000/health
          docker stop todo-api-test
